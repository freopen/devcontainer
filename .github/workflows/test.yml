name: Test Feature

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dev Container CLI
        run: npm install --global @devcontainers/cli

      - name: Test codex Feature
        run: devcontainer features test -p . -f codex
